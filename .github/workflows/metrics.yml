name: Metrics
on:
  schedule:
    - cron: "0 4 * * *"  # täglich 04:00 UTC
  workflow_dispatch:
  push:
    branches: ["master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          user: TheDevGuyMarc
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Berlin
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_threshold: 0
          # Achievements-Plugin deaktiviert: fragt intern noch die von GitHub abgeschaltete
          # "Projects (Classic)"-API ab und bricht deshalb aktuell bei jedem Account mit
          # "Unexpected error" ab. Offener Upstream-Fix: lowlighter/metrics PR #1769.
          # Sobald der gemergt ist, kann plugin_achievements wieder auf "yes" gesetzt werden.
          plugin_achievements: no
